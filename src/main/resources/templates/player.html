<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EKO Player</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="player-page">

    <header class="topbar">
        <a href="/" class="logo">EKO</a>
        <span class="track-count" th:text="${videos != null ? videos.size() + ' músicas' : ''}"></span>
    </header>

    <!-- Erro -->
    <div th:if="${error}" class="error-message">
        <p th:text="${error}"></p>
        <a href="/">Voltar</a>
    </div>

    <!-- Player principal -->
    <div th:if="${videos != null and !videos.isEmpty()}" class="player-layout">

        <!-- Painel esquerdo: player + controles -->
        <div class="player-main">
            <div class="video-wrapper">
                <div id="youtube-player"></div>
            </div>

            <div class="now-playing">
                <img id="current-thumb" src="" alt="thumbnail" class="current-thumb">
                <div class="current-info">
                    <p id="current-title" class="current-title">Selecione uma música</p>
                    <p id="current-channel" class="current-channel"></p>
                </div>
            </div>

            <div class="controls">
                <button onclick="prevTrack()" class="ctrl-btn" title="Anterior">&#9664;&#9664;</button>
                <button onclick="togglePlay()" class="ctrl-btn ctrl-main" id="btn-play" title="Play/Pause">&#9654;</button>
                <button onclick="nextTrack()" class="ctrl-btn" title="Próximo">&#9654;&#9654;</button>
                <button onclick="toggleShuffle()" class="ctrl-btn" id="btn-shuffle" title="Aleatório">&#8646;</button>
            </div>
        </div>

        <!-- Painel direito: fila de músicas -->
        <div class="queue-panel">
            <h2 class="queue-title">Fila de reprodução</h2>
            <ul class="track-list" id="track-list">
                <li th:each="video, stat : ${videos}"
                    th:data-video-id="${video.videoId}"
                    th:data-title="${video.title}"
                    th:data-channel="${video.channelTitle}"
                    th:data-thumb="${video.thumbnailUrl}"
                    th:data-index="${stat.index}"
                    class="track-item"
                    onclick="playTrack(this)">
                    <span class="track-number" th:text="${stat.index + 1}"></span>
                    <img th:src="${video.thumbnailUrl}" th:alt="${video.title}" class="track-thumb">
                    <div class="track-info">
                        <p class="track-title" th:text="${video.title}"></p>
                        <p class="track-channel" th:text="${video.channelTitle}"></p>
                    </div>
                </li>
            </ul>
        </div>
    </div>

    <script th:inline="javascript">
        var videosData = [];
        document.querySelectorAll('.track-item').forEach(function(item) {
            videosData.push({
                videoId: item.dataset.videoId,
                title: item.dataset.title,
                channel: item.dataset.channel,
                thumb: item.dataset.thumb,
                index: parseInt(item.dataset.index)
            });
        });
    </script>
    <script th:src="@{/js/player.js}"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

</body>
</html>
