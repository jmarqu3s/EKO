<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EKO Player</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body class="player-page">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div th:if="${error}" class="error-message">
        <p th:text="${error}"></p>
        <a href="/">&#8592; Voltar</a>
    </div>

    <div th:if="${videos != null and !videos.isEmpty()}" id="app" th:data-playlist-id="${playlistId}">

        <!-- ÁREA PRINCIPAL: vídeo + fila -->
        <div class="main-area">

            <!-- Vídeo -->
            <div class="video-section">
                <div class="video-wrapper">
                    <div id="youtube-player"></div>
                </div>
            </div>

            <!-- Fila -->
            <div class="queue-section">
                <div class="queue-header">
                    <a href="/" class="logo">EKO</a>
                    <span class="track-count" th:text="${videos.size() + ' faixas'}"></span>
                </div>
                <div class="queue-search">
                    <input type="text" id="queue-search-input" class="queue-search-input"
                           placeholder="Buscar na fila..."
                           oninput="filterQueue(this.value)">
                </div>
                <ul class="track-list" id="track-list">
                    <li th:each="video, stat : ${videos}"
                        th:data-video-id="${video.videoId}"
                        th:data-title="${video.title}"
                        th:data-channel="${video.channelTitle}"
                        th:data-thumb="${video.thumbnailUrl}"
                        th:data-index="${stat.index}"
                        class="track-item"
                        onclick="playTrack(this)">
                        <span class="track-number" th:text="${stat.index + 1}"></span>
                        <img th:src="${video.thumbnailUrl}" th:alt="${video.title}" class="track-thumb">
                        <div class="track-info">
                            <p class="track-title" th:text="${video.title}"></p>
                            <p class="track-channel" th:text="${video.channelTitle}"></p>
                        </div>
                        <button class="track-remove-btn" onclick="removeTrack(event, this)" title="Remover da fila">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                            </svg>
                        </button>
                    </li>
                </ul>
                <div th:if="${hiddenCount > 0}" class="hidden-count-msg">
                    <span th:text="${hiddenCount + (hiddenCount == 1 ? ' vídeo indisponível oculto' : ' vídeos indisponíveis ocultos')}"></span>
                </div>
            </div>
        </div>

        <!-- BARRA INFERIOR DE CONTROLES -->
        <div class="player-bar">

            <!-- Barra de progresso -->
            <div class="progress-row">
                <span class="progress-time" id="time-current">0:00</span>
                <div class="progress-bar-wrap" id="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progress-bar-fill"></div>
                </div>
                <span class="progress-time" id="time-total">0:00</span>
            </div>

            <!-- Linha de controles -->
            <div class="controls-row">
                <!-- Info da música atual -->
                <div class="bar-info">
                    <img id="bar-thumb" src="" alt="" class="bar-thumb">
                    <div class="bar-text">
                        <p id="bar-title" class="bar-title">—</p>
                        <p id="bar-channel" class="bar-channel"></p>
                    </div>
                </div>

                <!-- Controles centrais -->
                <div class="bar-controls">
                    <button onclick="toggleShuffle()" class="bar-btn" id="btn-shuffle" title="Aleatório">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                            <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
                        </svg>
                    </button>
                    <button onclick="prevTrack()" class="bar-btn" title="Anterior">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                        </svg>
                    </button>
                    <button onclick="togglePlay()" class="bar-btn bar-btn-main" id="btn-play" title="Play/Pause">
                        <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" width="22" height="22" style="display:none">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>
                    <button onclick="nextTrack()" class="bar-btn" title="Próximo">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                        </svg>
                    </button>
                    <button onclick="cycleRepeat()" class="bar-btn" id="btn-repeat" title="Repetir">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                        </svg>
                    </button>
                </div>

                <!-- Opções -->
                <div class="bar-right">
                    <div class="bar-options-wrap">
                        <button class="bar-btn" id="btn-options" onclick="toggleOptionsMenu()" title="Opções">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                                <circle cx="12" cy="5" r="1.8"/>
                                <circle cx="12" cy="12" r="1.8"/>
                                <circle cx="12" cy="19" r="1.8"/>
                            </svg>
                        </button>
                        <div class="bar-options-menu" id="bar-options-menu">
                            <button class="bar-options-item" onclick="openSaveModal()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" style="margin-right:8px;vertical-align:middle;">
                                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                                </svg>
                                Salvar playlist
                            </button>
                            <button class="bar-options-item" onclick="syncPlaylist()">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14" style="margin-right:8px;vertical-align:middle;">
                                    <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
                                </svg>
                                Atualizar playlist
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Toast de sincronização -->
    <div class="sync-toast" id="sync-toast"></div>

    <!-- Modal salvar playlist -->
    <div class="save-modal-overlay" id="save-modal-overlay" onclick="closeSaveModal()"></div>
    <div class="save-modal" id="save-modal">
        <p class="save-modal-title">Salvar playlist</p>
        <input type="text" class="save-modal-input" id="save-modal-input"
               placeholder="Nome da playlist" maxlength="80"
               onkeydown="if(event.key==='Enter') confirmSavePlaylist()">
        <div class="save-modal-actions">
            <button class="save-modal-btn save-modal-cancel" onclick="closeSaveModal()">Cancelar</button>
            <button class="save-modal-btn save-modal-confirm" onclick="confirmSavePlaylist()">Salvar</button>
        </div>
    </div>

    <script th:inline="javascript">
        var videosData = [];
        document.querySelectorAll('.track-item').forEach(function(item) {
            videosData.push({
                videoId: item.dataset.videoId,
                title: item.dataset.title,
                channel: item.dataset.channel,
                thumb: item.dataset.thumb,
                index: parseInt(item.dataset.index)
            });
        });
    </script>
    <script th:src="@{/js/player.js}"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

</body>
</html>
