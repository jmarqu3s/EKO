<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EKO — Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="home-page">

    <div class="home-container">
        <div class="logo-area">
            <a href="/" class="logo" style="display:block;margin-bottom:0.5rem">EKO</a>
            <p class="tagline">Acesse sua conta</p>
        </div>

        <div th:if="${param.registered}" class="auth-success">
            Cadastro realizado! Faça login para continuar.
        </div>
        <div th:if="${param.error}" class="auth-error">
            E-mail ou senha incorretos.
        </div>
        <div th:if="${param.logout}" class="auth-success">
            Você saiu da sua conta.
        </div>

        <form action="/login" method="post" class="search-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="auth-field">
                <input type="text" name="username" placeholder="Usuário" required class="playlist-input auth-input"/>
            </div>
            <div class="auth-field">
                <input type="password" name="password" placeholder="Senha" required class="playlist-input auth-input"/>
            </div>

            <button type="submit" class="btn-play btn-full">Entrar</button>
        </form>

        <p class="auth-link">Não tem conta? <a href="/register">Cadastre-se</a></p>
    </div>

</body>
</html>
